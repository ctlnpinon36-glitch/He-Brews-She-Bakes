<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>He Brews She Bakes</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fdf5ed;
      color: #4d3b2b;
    }

    /* Header Banner */
    header {
      text-align: center;
      width: 100%;
      overflow: hidden;
    }

    header img {
      width: 100%;
      height: 300px; /* moderate banner height */
      object-fit: cover;
    }

    /* Our Story Section */
    .story-section {
      display: flex;
      gap: 40px;
      padding: 50px;
      align-items: flex-start;
    }

    .story-text {
      flex: 1;
    }

    .story-text h2 {
      font-size: 2rem;
    }

    .story-text p {
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .story-images {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      flex: 1;
    }

    .story-images img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
    }

    /* Menu Slider Section */
    .menu-section {
      padding: 50px;
    }

    .menu-slider img {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
    }

    .slider-nav {
      margin-top: 10px;
      text-align: center;
    }

    .slider-nav button {
      padding: 10px 20px;
      margin: 0 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <img src="HBSBHeader.png" alt="He Brews She Bakes Logo">
  </header>

  <!-- Our Story Section -->
  <section class="story-section">
    <div class="story-text">
      <h2>Our Story</h2>
      <p>He Brews She Bakes Café started as an online business built around homemade baked goods created to make customers feel a sense of warmth, comfort, and familiarity — a true “home away from home.”</p>
    </div>
    <div class="story-images">
      <img src="story1.png" alt="Story Image 1">
      <img src="story2.png" alt="Story Image 2">
      <img src="story3.png" alt="Story Image 3">
      <img src="story4.png" alt="Story Image 4">
    </div>
  </section>

  <!-- Menu Section -->
  <section class="menu-section">
    <h2>Our Menu</h2>
    <div class="menu-slider">
      <img id="currentSlide" src="menu1.png" alt="Menu Slide">
      <div class="slider-nav">
        <button onclick="prevSlide()">&#8592; Prev</button>
        <button onclick="nextSlide()">Next &#8594;</button>
      </div>
    </div>
  </section>

  <script>
    const slides = ['menu1.png','menu2.png','menu3.png','menu4.png','menu5.png','menu6.png','menu7.png','menu8.png','menu9.png'];
    let currentIndex = 0;

    function showSlide(index) {
      document.getElementById('currentSlide').src = slides[index];
    }

    function prevSlide() {
      currentIndex = (currentIndex - 1 + slides.length) % slides.length;
      showSlide(currentIndex);
    }

    function nextSlide() {
      currentIndex = (currentIndex + 1) % slides.length;
      showSlide(currentIndex);
    }
  </script>

</body>
</html>
