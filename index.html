<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>He Brews She Bakes</title>
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #f8f1eb;
      color: #3b3b3b;
      margin: 0;
      padding: 0;
    }

    /* Header */
    header {
      text-align: center;
      padding: 30px 0;
    }

    header img {
      max-width: 400px;
      width: 100%;
      height: auto;
    }

    /* Our Story */
    .our-story {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 50px 10%;
      gap: 30px;
    }

    .our-story-text {
      flex: 1;
    }

    .our-story-text h2 {
      font-family: 'Pacifico', cursive;
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    .our-story-text p {
      font-size: 1rem;
      line-height: 1.6;
    }

    .our-story-images {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .our-story-images img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }

    /* Menu Carousel */
    .menu-section {
      text-align: center;
      padding: 50px 0;
    }

    .menu-section h2 {
      font-size: 2rem;
      margin-bottom: 30px;
    }

    .menu-carousel {
      position: relative;
      width: 80%;
      margin: 0 auto;
    }

    .menu-carousel img {
      width: 100%;
      border-radius: 10px;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background-color: rgba(0,0,0,0.3);
      color: #fff;
      border: none;
      font-size: 2rem;
      padding: 10px;
      cursor: pointer;
    }

    .carousel-btn.prev { left: 10px; }
    .carousel-btn.next { right: 10px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <img src="HBSBHeader.png" alt="He Brews She Bakes Logo">
  </header>

  <!-- Our Story Section -->
  <section class="our-story">
    <div class="our-story-text">
      <h2>Our Story</h2>
      <p>He Brews She Bakes Café started as an online business built around homemade baked goods created to make customers feel a sense of warmth, comfort, and familiarity — a true “home away from home.”</p>
    </div>
    <div class="our-story-images">
      <img src="story1.png" alt="Story Image 1">
      <img src="story2.png" alt="Story Image 2">
      <img src="story3.png" alt="Story Image 3">
      <img src="story4.png" alt="Story Image 4">
    </div>
  </section>

  <!-- Menu Section -->
  <section class="menu-section">
    <h2>Our Menu</h2>
    <div class="menu-carousel">
      <img id="menuImage" src="menu1.png" alt="Menu Item">
      <button class="carousel-btn prev" onclick="prevMenu()">&#10094;</button>
      <button class="carousel-btn next" onclick="nextMenu()">&#10095;</button>
    </div>
  </section>

  <script>
    const menuImages = [
      'menu1.png','menu2.png','menu3.png','menu4.png','menu5.png','menu6.png','menu7.png','menu8.png','menu9.png'
    ];
    let currentIndex = 0;
    const menuImageEl = document.getElementById('menuImage');

    function prevMenu() {
      currentIndex = (currentIndex - 1 + menuImages.length) % menuImages.length;
      menuImageEl.src = menuImages[currentIndex];
    }

    function nextMenu() {
      currentIndex = (currentIndex + 1) % menuImages.length;
      menuImageEl.src = menuImages[currentIndex];
    }
  </script>

</body>
</html>
