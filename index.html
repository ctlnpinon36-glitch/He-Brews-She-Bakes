<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>He Brews She Bakes</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #f8f1eb;
      color: #3b3b3b;
      font-family: 'Montserrat', sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 0;
    }

    img {
      max-width: 100%;
      display: block;
    }

    header {
      text-align: center;
      margin: 40px 0;
    }
    /* Story Section */
    .story-section {
      display: flex;
      flex-wrap: wrap;
      padding: 50px 5%;
      gap: 20px;
      align-items: center;
      justify-content: center;
    }
    .story-text {
      flex: 1 1 300px;
      max-width: 500px;
    }
    .story-text h2 {
      font-family: 'Pacifico', cursive;
      font-size: 2.5rem;
      margin-bottom: 20px;
    }
    .story-text p {
      font-size: 1rem;
      line-height: 1.5;
    }
    .story-images {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      flex: 1 1 400px;
    }
    .story-images img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }

    /* Menu Slider */
    .menu-section {
      text-align: center;
      padding: 50px 0;
    }
    .menu-section h2 {
      font-family: 'Pacifico', cursive;
      font-size: 2rem;
      margin-bottom: 20px;
    }
    .menu-slider {
      position: relative;
      max-width: 600px;
      margin: 0 auto;
      overflow: hidden;
    }
    .menu-slide {
      display: none;
    }
    .menu-slide img {
      width: 100%;
      height: auto;
      border-radius: 12px;
    }
    .prev, .next {
      cursor: pointer;
      position: absolute;
      top: 50%;
      width: auto;
      padding: 12px;
      margin-top: -22px;
      color: white;
      font-weight: bold;
      font-size: 18px;
      border-radius: 0 3px 3px 0;
      user-select: none;
      background: rgba(0,0,0,0.3);
    }
    .next {
      right: 0;
      border-radius: 3px 0 0 3px;
    }

    /* Customer Photos */
    .customer-photos {
      padding: 50px 5%;
      background: #f2ede8;
      text-align: center;
    }
    .customer-photos h2 {
      font-family: 'Pacifico', cursive;
      font-size: 2rem;
      margin-bottom: 40px;
    }
    .customer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      justify-items: center;
    }
    .customer-grid img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <img src="HBSBHeader.png" alt="He Brews She Bakes Header">
  </header>

  <!-- Story Section -->
  <section class="story-section">
    <div class="story-text">
      <h2>Our Story</h2>
      <p>He Brews She Bakes Café started as an online business built around homemade baked goods created to make customers feel a sense of warmth, comfort, and familiarity — a true “home away from home.”</p>
    </div>
    <div class="story-images">
      <img src="story1.png" alt="Story Image 1">
      <img src="story2.png" alt="Story Image 2">
      <img src="story3.png" alt="Story Image 3">
      <img src="story4.png" alt="Story Image 4">
    </div>
  </section>

  <!-- Menu Section -->
  <section class="menu-section">
    <h2>Our Menu</h2>
    <div class="menu-slider">
      <div class="menu-slide"><img src="menu1.png" alt="Menu 1"></div>
      <div class="menu-slide"><img src="menu2.png" alt="Menu 2"></div>
      <div class="menu-slide"><img src="menu3.png" alt="Menu 3"></div>
      <div class="menu-slide"><img src="menu4.png" alt="Menu 4"></div>
      <div class="menu-slide"><img src="menu5.png" alt="Menu 5"></div>
      <div class="menu-slide"><img src="menu6.png" alt="Menu 6"></div>
      <div class="menu-slide"><img src="menu7.png" alt="Menu 7"></div>
      <div class="menu-slide"><img src="menu8.png" alt="Menu 8"></div>
      <div class="menu-slide"><img src="menu9.png" alt="Menu 9"></div>

      <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
      <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>
  </section>

  <!-- Customer Photos -->
  <section class="customer-photos">
    <h2>Our Happy Customers</h2>
    <div class="customer-grid">
      <img src="path_to_customer_1.jpg" alt="Customer Photo">
      <img src="path_to_customer_2.jpg" alt="Customer Photo">
      <img src="path_to_customer_3.jpg" alt="Customer Photo">
      <img src="path_to_customer_4.jpg" alt="Customer Photo">
    </div>
  </section>

  <script>
    let slideIndex = 1;
    showSlides(slideIndex);

    function plusSlides(n) {
      showSlides(slideIndex += n);
    }

    function showSlides(n) {
      let i;
      let slides = document.getElementsByClassName("menu-slide");
      if (n > slides.length) {slideIndex = 1}
      if (n < 1) {slideIndex = slides.length}
      for (i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
      }
      slides[slideIndex-1].style.display = "block";
    }
  </script>

</body>
</html>
