<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>He Brews She Bakes</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fdf5ed;
      color: #4d3b2b;
    }
    header {
    text-align: center;
    padding: 20px 0 40px 0; /* added bottom padding to separate the story section */
}

header img {
    width: 100%;
    height: 250px; /* or adjust to banner size */
    object-fit: cover;
}
    }
   .story-section {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 50px;
    gap: 40px;
}

.story-text {
    flex: 1;
    max-width: 50%;
}

.story-text h2 {
    font-size: 2rem; /* adjust if you want bigger */
    margin-bottom: 20px;
}

.story-text p {
    font-size: 1.1rem;
    line-height: 1.6;
}

.story-images {
    flex: 1;
    max-width: 50%;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.story-images img {
    width: 100%;
    height: auto;
    border-radius: 10px;
}
    .menu-section {
      text-align: center;
      padding: 50px 20px;
    }
    .menu-section h2 {
      font-family: 'Pacifico', cursive;
      font-size: 2em;
      margin-bottom: 30px;
    }
    .menu-slider {
      max-width: 600px;
      margin: 0 auto;
      position: relative;
    }
    .menu-slider img {
      width: 100%;
      border-radius: 10px;
    }
    .slider-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }
    .slider-nav button {
      padding: 5px 10px;
      cursor: pointer;
      border: none;
      background-color: #4d3b2b;
      color: white;
      border-radius: 5px;
    }
    .customer-section {
      text-align: center;
      padding: 50px 20px;
    }
    .customer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      justify-items: center;
      align-items: center;
      max-width: 800px;
      margin: 0 auto;
    }
    .customer-grid img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <header>
    <img src="HBSBHeader.png" alt="He Brews She Bakes Logo">
</header>

  <section class="story-section">
  <div class="story-text">
    <h2>Our Story</h2>
    <p>He Brews She Bakes Café started as an online business built around homemade baked goods created to make customers feel a sense of warmth, comfort, and familiarity — a true “home away from home.”</p>
  </div>
  <div class="story-images">
    <img src="story1.png" alt="Story Image 1">
    <img src="story2.png" alt="Story Image 2">
    <img src="story3.png" alt="Story Image 3">
    <img src="story4.png" alt="Story Image 4">
  </div>
</section>

  <section class="menu-section">
    <h2>Our Menu</h2>
    <div class="menu-slider">
      <img id="currentSlide" src="menu1.png" alt="Menu Slide">
      <div class="slider-nav">
        <button onclick="prevSlide()">&#8592; Prev</button>
        <button onclick="nextSlide()">Next &#8594;</button>
      </div>
    </div>
  </section>

  <section class="customer-section">
    <h2>Our Happy Customers</h2>
    <div class="customer-grid">
      <img src="customer1.png" alt="Customer 1">
      <img src="customer2.png" alt="Customer 2">
      <img src="customer3.png" alt="Customer 3">
      <img src="customer4.png" alt="Customer 4">
    </div>
  </section>

  <script>
const slides = [
  'menu1.png',
  'menu2.png',
  'menu3.png',
  'menu4.png',
  'menu5.png',
  'menu6.png',
  'menu7.png',
  'menu8.png',
  'menu9.png'
];

let currentIndex = 0;

function showSlide(index) {
  const slide = document.getElementById('currentSlide');
  slide.src = slides[index];
}

function nextSlide() {
  currentIndex = (currentIndex + 1) % slides.length;
  showSlide(currentIndex);
}

function prevSlide() {
  currentIndex = (currentIndex - 1 + slides.length) % slides.length;
  showSlide(currentIndex);
}
</script>

</body>
</html>
