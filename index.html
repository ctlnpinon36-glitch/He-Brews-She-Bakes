<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>He Brews She Bakes</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fdf5ed;
      color: #4d3b2b;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 0;
    }

    header img {
      width: auto;
      max-width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
      margin: 0 auto;
    }

    /* OUR STORY */
    .story-section {
      display: flex;
      padding: 50px;
      gap: 30px;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .story-text {
      flex: 1;
      min-width: 250px;
    }

    .story-text h2 {
      font-family: 'Pacifico', cursive;
      font-size: 2em;
      margin-bottom: 20px;
    }

    .story-text p {
      font-size: 1rem;
      line-height: 1.6;
    }

    .story-images {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-gap: 15px;
      flex: 1;
      min-width: 250px;
    }

    .story-images img {
      width: 100%;
      border-radius: 10px;
    }

    /* MENU SECTION */
    .menu-section {
      text-align: center;
      padding: 50px 20px;
    }

    .menu-section h2 {
      font-family: 'Pacifico', cursive;
      font-size: 2em;
      margin-bottom: 30px;
    }

    .menu-slider {
      position: relative;
      max-width: 600px;
      margin: 0 auto;
    }

    #currentSlide {
      width: auto;
      max-width: 100%;
      height: 400px;
      object-fit: contain;
      border-radius: 10px;
      display: block;
      margin: 0 auto;
    }

    .slider-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .slider-nav button {
      padding: 10px 20px;
      cursor: pointer;
    }

    /* VISIT US SECTION */
    .visit-us-section {
      text-align: center;
      padding: 50px 20px;
      background-color: #fdf5ed;
    }

    .visit-us-section h2 {
      font-family: 'Pacifico', cursive;
      font-size: 2em;
      margin-bottom: 30px;
      color: #4d3b2b;
    }

    .visit-us-maps {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .map-item {
      flex: 1 1 250px;
      max-width: 500px;
      text-align: center;
    }

    .map-item iframe {
      width: 100%;
      height: 250px;
      border-radius: 10px;
      border: 0;
    }

    .map-item h3 {
      margin-top: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #4d3b2b;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <img src="HBSBHeader.png" alt="He Brews She Bakes Logo">
</header>

<!-- OUR STORY -->
<section class="story-section">
  <div class="story-text">
    <h2>Our Story</h2>
    <p>He Brews She Bakes Café started as an online business built around homemade baked goods created to make customers feel a sense of warmth, comfort, and familiarity — a true “home away from home.”</p>
  </div>
  <div class="story-images">
    <img src="story1.png" alt="Story Image 1">
    <img src="story2.png" alt="Story Image 2">
    <img src="story3.png" alt="Story Image 3">
    <img src="story4.png" alt="Story Image 4">
  </div>
</section>

<!-- MENU -->
<section class="menu-section">
  <h2>Our Menu</h2>
  <div class="menu-slider">
    <img id="currentSlide" src="menu1.png" alt="Menu Slide">
    <div class="slider-nav">
      <button onclick="prevSlide()">← Prev</button>
      <button onclick="nextSlide()">Next →</button>
    </div>
  </div>
</section>

<!-- VISIT US -->
<section class="visit-us-section">
  <h2>Visit Us</h2>
  <div class="visit-us-maps">
    <div class="map-item">
      <iframe src="https://maps.app.goo.gl/1ULCeK5NUNdDFvks8" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      <h3>Salitran Branch</h3>
    </div>
    <div class="map-item">
      <iframe src="https://maps.app.goo.gl/To26YQxuGJCA7qix8" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      <h3>Lancaster Branch</h3>
    </div>
  </div>
</section>

<script>
  const slides = ['menu1.png','menu2.png','menu3.png','menu4.png','menu5.png','menu6.png','menu7.png','menu8.png','menu9.png'];
  let currentIndex = 0;

  function showSlide(index) {
    document.getElementById('currentSlide').src = slides[index];
  }

  function prevSlide() {
    currentIndex = (currentIndex - 1 + slides.length) % slides.length;
    showSlide(currentIndex);
  }

  function nextSlide() {
    currentIndex = (currentIndex + 1) % slides.length;
    showSlide(currentIndex);
  }
</script>

</body>
</html>
