<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>He Brews She Bakes</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    background-color: #fdf5ec;
  }
  header {
    text-align: center;
    padding: 40px 20px 20px;
  }
  header img {
    max-width: 400px;
    width: 80%;
    height: auto;
  }
  section {
    padding: 60px 20px;
  }
  /* Our Story */
  .our-story {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    align-items: flex-start;
  }
  .our-story-text {
    flex: 1;
    min-width: 280px;
  }
  .our-story-text h2 {
    font-family: 'Pacifico', cursive;
    font-size: 2rem;
    margin-bottom: 20px;
  }
  .our-story-text p {
    font-size: 1rem;
    line-height: 1.6;
  }
  .our-story-images {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    min-width: 280px;
  }
  .our-story-images img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
  }
  /* Menu */
  .menu-section {
    text-align: center;
    max-width: 700px;
    margin: 0 auto;
  }
  .menu-section img {
    width: 100%;
    height: auto;
    border-radius: 10px;
  }
  .menu-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
  }
  .menu-nav button {
    padding: 8px 16px;
    font-size: 1rem;
    cursor: pointer;
  }
  /* Customer photos */
  .customer-photos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    justify-items: center;
  }
  .customer-photos img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
  }
</style>
</head>
<body>

<header>
  <img src="HBSBHeader.png" alt="He Brews She Bakes Header">
</header>

<section class="our-story">
  <div class="our-story-text">
    <h2>Our Story</h2>
    <p>He Brews She Bakes Café started as an online business built around homemade baked goods created to make customers feel a sense of warmth, comfort, and familiarity — a true “home away from home.”</p>
  </div>
  <div class="our-story-images">
    <img src="story1.png" alt="Story 1">
    <img src="story2.png" alt="Story 2">
    <img src="story3.png" alt="Story 3">
    <img src="story4.png" alt="Story 4">
  </div>
</section>

<section class="menu-section">
  <h2>Our Menu</h2>
  <img id="menu-image" src="menu1.png" alt="Menu 1">
  <div class="menu-nav">
    <button id="prev-btn">&lt; Prev</button>
    <button id="next-btn">Next &gt;</button>
  </div>
</section>

<section class="customer-photos">
  <h2>Our Happy Customers</h2>
  <img src="customer1.png" alt="Customer 1">
  <img src="customer2.png" alt="Customer 2">
  <img src="customer3.png" alt="Customer 3">
  <img src="customer4.png" alt="Customer 4">
</section>

<script>
  const menuImages = [
    "menu1.png","menu2.png","menu3.png","menu4.png","menu5.png",
    "menu6.png","menu7.png","menu8.png","menu9.png"
  ];
  let currentMenu = 0;
  const menuImageEl = document.getElementById('menu-image');

  document.getElementById('prev-btn').addEventListener('click', () => {
    currentMenu = (currentMenu - 1 + menuImages.length) % menuImages.length;
    menuImageEl.src = menuImages[currentMenu];
  });

  document.getElementById('next-btn').addEventListener('click', () => {
    currentMenu = (currentMenu + 1) % menuImages.length;
    menuImageEl.src = menuImages[currentMenu];
  });
</script>

</body>
</html>
